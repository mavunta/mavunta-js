name: Publish

# Publishes every package on a GitHub Release. Bump the package versions and
# cut a release; this builds, tests, and publishes to npm with provenance.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: the bridge/react packages typecheck against built dist types.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      # Publishes any package whose version is not yet on the registry, in
      # dependency order. pnpm rewrites workspace: ranges to real versions.
      - run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
